<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login Dark Pro</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family: 'Segoe UI', sans-serif;
}

/* --- ส่วนที่ปรับเปลี่ยน: พื้นหลังแบบ Animated Gradient --- */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    /* ไล่สี ดำ -> น้ำเงินเข้ม -> เขียวเข้มมากๆ -> ดำ */
    background: linear-gradient(-45deg, #0F2854, #1C4D8D, #4988C4, #BDE8F5);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
/* ----------------------------------------------- */

/* กล่องล็อกอิน */
.login{
    width:320px;
    padding:40px;
    border-radius:20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 0 40px rgba(0,0,0,0.6);
    color:white;
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.login h1{
    text-align:center;
    margin-bottom:25px;
    letter-spacing:2px;
}

label{
    font-size:14px;
    opacity:0.8;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0 18px 0;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    color:white;
    outline:none;
    transition:0.3s;
}

/* ตอนกดพิมพ์ */
input:focus{
    background:rgba(255,255,255,0.15);
    box-shadow:0 0 10px #00ff88;
}

/* ปุ่ม */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background: linear-gradient(90deg,#00c853,#00e676);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

/* hover */
button:hover{
    box-shadow:0 0 20px #00ff88;
}

/* ตอนกด */
button:active{
    transform:scale(0.95);
    box-shadow:0 0 30px #00ff88;
}

</style>
</head>
<body>

<div class="login">
    <form>
        <h1>LOG IN</h1>

        <label>อีเมล</label>
        <input type="text" placeholder="กรอกอีเมล">

        <label>รหัสผ่าน</label>
        <input type="password" placeholder="กรอกรหัสผ่าน">

        <button type="button" onclick="window.location.href='wow4.html'">
            เข้าสู่หน้าหลัก
        </button>
    </form>
</div>

</body>
</html>
