<!<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Chat with AI Tutor</title>

<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}
  
  body{
      background:#0f0f14;
      color:white;
      display:flex;
      flex-direction:column;
      /* แก้ปัญหาช่องพิมพ์หายบนมือถือ */
      height: 100vh; 
      height: 100dvh; 
      overflow: hidden; /* ล็อคไม่ให้หน้าเว็บเด้งไปมา */
  }
  
  header{padding:15px;background:#1a1a25;display:flex;align-items:center;gap:10px;border-bottom:1px solid #2a2a3a;}
  header img{width:40px;height:40px;border-radius:50%;object-fit:cover;background:#333;}
  header button{background:none;border:none;color:#00c853;font-size:20px;cursor:pointer;padding-right:10px;}
  
  .chat-box{flex:1;padding:15px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
  .message{padding:12px 16px;border-radius:15px;max-width:80%;line-height:1.5;word-wrap:break-word;}
  .user{background:#00c853;color:white;align-self:flex-end;border-bottom-right-radius:2px;}
  .bot{background:#2a2a3a;color:#e0e0e0;align-self:flex-start;border-bottom-left-radius:2px;}
  
  .input-area{display:flex;padding:15px;background:#1a1a25;gap:10px;}
  input{flex:1;padding:12px;border:none;border-radius:8px;background:#2a2a3a;color:white;outline:none;}
  input:focus{box-shadow:0 0 0 2px #00c853;}
  button#sendBtn{padding:10px 20px;border:none;border-radius:8px;background:#00c853;color:white;cursor:pointer;font-weight:bold;}
  button#sendBtn:disabled{background:#444;cursor:not-allowed;}

  /* ตกแต่ง Scrollbar */
  .chat-box::-webkit-scrollbar {width: 6px;}
  .chat-box::-webkit-scrollbar-thumb {background: #2a2a3a; border-radius: 10px;}
</style>
</head>
<body>

<header>
  <button onclick="goBack()">←</button>
  <img id="tutorImg" src="https://cdn-icons-png.flaticon.com/512/4712/4712010.png" alt="Tutor Avatar">
  <div>
    <div id="tutorName">Loading...</div>
    <small id="tutorSubject" style="color:#aaa;"></small>
  </div>
</header>

<div class="chat-box" id="chatBox"></div>

<div class="input-area">
  <input type="text" id="msg" placeholder="ถามคำถามติวเตอร์ที่นี่..." onkeypress="handleKeyPress(event)">
  <button id="sendBtn" onclick="send()">ส่ง</button>
</div>

<script>
// --- ส่วนการจัดการข้อมูลติวเตอร์ ---
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const tutors = JSON.parse(localStorage.getItem("tutors")) || [];

// ดักจับกรณีที่คนอื่นเปิดเข้ามาเล่นแล้วไม่มีข้อมูลใน localStorage
const tutor = tutors[id] || { 
    name: "ติวเตอร์ AI", 
    subject: "ตอบได้ทุกเรื่อง", 
    image: "https://cdn-icons-png.flaticon.com/512/4712/4712010.png" 
};

// อัปเดต UI ด้านบน
if (tutor.image) document.getElementById("tutorImg").src = tutor.image;
document.getElementById("tutorName").innerText = tutor.name;
document.getElementById("tutorSubject").innerText = tutor.subject;

let chats = JSON.parse(localStorage.getItem("chat_" + id)) || [];

// --- ฟังก์ชันการแสดงผล ---
function render() {
  const box = document.getElementById("chatBox");
  box.innerHTML = "";
  chats.forEach(m => {
    const div = document.createElement("div");
    div.className = "message " + m.type;
    div.innerText = m.text;
    box.appendChild(div);
  });
  // เลื่อนลงล่างสุดอย่างนุ่มนวล
  box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
}

// --- ฟังก์ชันเรียก API (Groq) ---
async function getAIResponse(userMessage) {
    const apiKey = "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"; 
    const url = "https://api.groq.com/openai/v1/chat/completions";

    try {
        const response = await fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${apiKey}`
            },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [
                    { 
                        role: "system", 
                        content: `คุณคือติวเตอร์ชื่อ ${tutor.name} สอนวิชา ${tutor.subject} ตอบเป็นภาษาไทยด้วยบุคลิกสุภาพ ใจดี อธิบายสั้นแต่เข้าใจง่าย` 
                    },
                    { role: "user", content: userMessage }
                ],
                temperature: 0.7
            })
        });

        if (!response.ok) throw new Error("Network response was not ok");
        const data = await response.json();
        return data.choices[0]?.message?.content || "ขออภัย ติวเตอร์ไม่พบคำตอบ";
    } catch (error) {
        console.error("API Error:", error);
        return "ขอโทษทีนะจ๊ะ พอดีระบบขัดข้องนิดหน่อย ลองถามใหม่ได้ไหม?";
    }
}

// --- ฟังก์ชันส่งข้อความ ---
async function send() {
    const input = document.getElementById("msg");
    const sendBtn = document.getElementById("sendBtn");
    const userText = input.value.trim();
    
    if (userText === "" || sendBtn.disabled) return;

    sendBtn.disabled = true;

    // 1. แสดงข้อความผู้ใช้
    chats.push({ type: "user", text: userText });
    input.value = "";
    render();

    // 2. แสดงสถานะกำลังพิมพ์
    const loadingId = Date.now(); 
    chats.push({ type: "bot", text: "กำลังคิดคำตอบให้นะ...", id: loadingId });
    render();

    // 3. เรียก AI
    const aiReply = await getAIResponse(userText);

    // 4. เปลี่ยนข้อความ "กำลังคิด..." เป็นคำตอบจริง
    chats = chats.filter(m => m.id !== loadingId); 
    chats.push({ type: "bot", text: aiReply });
    
    // 5. บันทึกและแสดงผล
    localStorage.setItem("chat_" + id, JSON.stringify(chats));
    render();
    
    // โฟกัสกลับไปที่ช่องพิมพ์อัตโนมัติ (ยกเว้นบนมือถือเพื่อป้องกันคีย์บอร์ดเด้งรัวๆ)
    if (window.innerWidth > 768) input.focus(); 
    sendBtn.disabled = false;
}

function handleKeyPress(e) {
  if (e.key === "Enter") send();
}

function goBack() {
  window.location.href = "wow4.html";
}

// รันครั้งแรก
render();
</script>

</body>
</html>
